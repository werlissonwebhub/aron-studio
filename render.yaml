services:
  - type: web
    name: aron-studio-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEV_MODE
        value: false
      - key: DB_NAME
        value: /var/data/aron_studio.db
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://aronstudio.com.br,https://www.aronstudio.com.br
